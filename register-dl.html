<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidekick Star 無料ダウンロード | Sidekick Lab</title>

      c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
      t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
      y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
  })(window, document, "clarity", "script", "xem6v4pdup");
</script>
<style>
  :root {
    --bg: #0a0a0d;
    --card: #16181f;
    --card2: #1c1f2a;
    --line: #252a36;
    --text: #f0f3fa;
    --sub: #9aa3b4;
    --muted: #5e6677;
    --accent: #ff8a00;
    --accent2: #ffb14a;
    --green: #3ecf82;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
      "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  a { color: inherit; text-decoration: none; }

  .container { max-width: 520px; width: 100%; }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo a {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    overflow: hidden;
  }

  .product-header {
    background: linear-gradient(135deg, #1a1428 0%, #12161f 100%);
    border-bottom: 1px solid var(--line);
    padding: 28px 32px;
  }
  .product-badge {
    display: inline-block;
    background: rgba(255,138,0,0.15);
    border: 1px solid rgba(255,138,0,0.4);
    color: var(--accent2);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }
  .product-name {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .product-desc {
    color: var(--sub);
    font-size: 0.88rem;
    line-height: 1.7;
  }
  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 14px;
  }
  .tag {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--line);
    color: var(--sub);
    font-size: 0.78rem;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .main-area { padding: 32px; }

  .consent-title {
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--text);
  }

  .info-box {
    background: rgba(255,138,0,0.06);
    border: 1px solid rgba(255,138,0,0.2);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 14px;
    font-size: 0.88rem;
  }
  .info-section { margin-bottom: 14px; }
  .info-section:last-child { margin-bottom: 0; }
  .info-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--accent2);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .info-list {
    list-style: none;
    padding: 0;
    color: var(--sub);
    line-height: 1.9;
  }
  .info-list li::before { content: '・'; color: var(--accent); }
  .info-divider {
    height: 1px;
    background: var(--line);
    margin: 14px 0;
  }

  .privacy-link-row {
    text-align: right;
    font-size: 0.8rem;
    margin-bottom: 20px;
  }
  .privacy-link-row a {
    color: var(--accent2);
    text-decoration: underline;
  }
  .privacy-link-row a:hover { color: var(--accent); }

  .checkbox-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
    cursor: pointer;
    font-size: 0.88rem;
    color: var(--sub);
    line-height: 1.5;
  }
  .checkbox-row input[type="checkbox"] {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    margin-top: 1px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .email-input {
    display: block;
    width: 100%;
    padding: 13px 16px;
    margin-bottom: 10px;
    background: var(--card2);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.9rem;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  .email-input:focus { outline: none; border-color: var(--accent); }
  .email-input::placeholder { color: var(--muted); }

  .dl-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 15px 24px;
    background: var(--accent);
    color: #000;
    font-size: 0.95rem;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    font-family: inherit;
    margin-bottom: 10px;
  }
  .dl-btn:hover:not(:disabled) { background: var(--accent2); }
  .dl-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .unsubscribe-note {
    text-align: center;
    font-size: 0.78rem;
    color: var(--muted);
  }

  #processing-state { display: none; text-align: center; padding: 20px 0; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #processing-state p { color: var(--sub); font-size: 0.9rem; margin-top: 12px; }

  #error-msg {
    display: none;
    background: rgba(90,30,30,0.4);
    border: 1px solid rgba(200,60,60,0.4);
    border-radius: 10px;
    padding: 14px 18px;
    color: #e08080;
    font-size: 0.85rem;
    margin-top: 16px;
    line-height: 1.6;
  }

  footer {
    text-align: center;
    padding: 24px 0 0;
    color: var(--muted);
    font-size: 0.75rem;
  }
  footer a { color: var(--muted); }
  footer a:hover { color: var(--sub); }
</style>
</head>
<body>
<div class="container">

  <div class="logo"><a href="/">Sidekick Lab</a></div>

  <div class="card">
    <!-- 製品ヘッダー（JSでproductパラメータに応じて書き換える） -->
    <div class="product-header">
      <div class="product-badge" id="ph-badge">無料試用</div>
      <div class="product-name" id="ph-name">Sidekick Star</div>
      <div class="product-desc" id="ph-desc">
        飛行機軌跡除去・天の川現像・比較明合成を<br>自動化する Photoshop スクリプト
      </div>
      <div class="tag-list" id="ph-tags">
        <span class="tag">3ヶ月無料</span>
        <span class="tag">Windows 対応</span>
        <span class="tag">Photoshop CC〜</span>
      </div>
    </div>

    <!-- メインエリア -->
    <div class="main-area">

      <!-- 同意・入力画面 -->
      <div id="consent-state">

        <div class="consent-title">個人情報の取り扱いについて</div>
        <div class="info-box">
          <div class="info-section">
            <div class="info-label">取得する情報</div>
            <ul class="info-list">
              <li>メールアドレス</li>
            </ul>
          </div>
          <div class="info-divider"></div>
          <div class="info-section">
            <div class="info-label">利用目的</div>
            <ul class="info-list">
              <li>ダウンロード履歴の管理</li>
              <li>製品アップデートや重要なお知らせのご案内</li>
              <li>お問い合わせ・サポート対応</li>
            </ul>
          </div>
        </div>
        <div class="privacy-link-row">
          <a href="/privacy.html" target="_blank">プライバシーポリシーを読む →</a>
        </div>

        <label class="checkbox-row">
          <input type="checkbox" id="consent-check" onchange="onConsentChange()">
          <span><a href="/privacy.html" target="_blank" style="color:var(--accent2);text-decoration:underline">プライバシーポリシー</a>とメール連絡に同意します</span>
        </label>

        <input type="email" id="email-input" class="email-input"
          placeholder="メールアドレスを入力" autocomplete="email"
          oninput="updateEmailBtn()">
        <button id="dl-btn" class="dl-btn" disabled onclick="submitEmail()">
          無料ダウンロードへ進む →
        </button>
        <p class="unsubscribe-note">メール配信はいつでも解除できます</p>

        <div id="error-msg"></div>
      </div>

      <!-- 処理中 -->
      <div id="processing-state">
        <div class="spinner"></div>
        <p>ダウンロードを準備しています...</p>
      </div>

    </div>
  </div>

  <footer>
    <a href="/privacy.html">プライバシーポリシー</a> &nbsp;·&nbsp;
    <a href="/legal.html">特定商取引法</a> &nbsp;·&nbsp;
    <a href="/faq.html">FAQ</a>
  </footer>

</div>

<!-- Firebase SDK (Firestore ログ用) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="/firebase-init.js"></script>

<script>
const CONSENT_VERSION = 'download-2026-06-25';

const params = new URLSearchParams(window.location.search);
const PRODUCT = params.get('product') || 'star';
const SRC     = params.get('src')     || 'direct';

const DL_PAGES = {
  star:     '/dl-star.html',
  portrait: '/dl-portrait.html',
  sky:      '/dl-sky.html',
  ai:       '/dl-ai.html'
};
const DL_PAGE = DL_PAGES[PRODUCT] || '/dl-star.html';

const PRODUCT_NAMES = {
  star:     'Sidekick_Star',
  portrait: 'Sidekick_Portrait',
  sky:      'Sidekick_SkyEffect',
  ai:       'Sidekick_AI'
};
const PRODUCT_NAME = PRODUCT_NAMES[PRODUCT] || 'Sidekick_Star';

// 製品ヘッダー表示用（バッジ・名前・説明・タグ）
const PRODUCT_INFO = {
  star: {
    badge: '無料試用',
    name: 'Sidekick Star',
    desc: '飛行機軌跡除去・天の川現像・比較明合成を<br>自動化する Photoshop スクリプト',
    tags: ['3ヶ月無料', 'Windows 対応', 'Photoshop CC〜']
  },
  portrait: {
    badge: '無料試用',
    name: 'Sidekick Portrait',
    desc: 'ポートレートの現像・レタッチ判断を<br>自動化する Photoshop スクリプト',
    tags: ['3ヶ月無料', 'Windows 対応', 'Photoshop CC〜']
  },
  sky: {
    badge: '無料試用',
    name: 'Sidekick Sky Effect',
    desc: '空の仕上げ・色調整を<br>自動化する Photoshop スクリプト',
    tags: ['3ヶ月無料', 'Windows 対応', 'Photoshop CC〜']
  },
  ai: {
    badge: '無料',
    name: 'Sidekick AI',
    desc: 'Sidekick Star / Portrait / Sky Effect の<br>使い方相談・エラー診断ローカルアシスタント',
    tags: ['完全無料', 'ローカル動作', 'Windows 対応']
  }
};

function applyProductHeader() {
  const info = PRODUCT_INFO[PRODUCT] || PRODUCT_INFO.star;
  document.getElementById('ph-badge').textContent = info.badge;
  document.getElementById('ph-name').textContent = info.name;
  document.getElementById('ph-desc').innerHTML = info.desc;
  const tagsEl = document.getElementById('ph-tags');
  tagsEl.innerHTML = '';
  info.tags.forEach(function(tag) {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = tag;
    tagsEl.appendChild(span);
  });
  document.title = info.name + ' 無料ダウンロード | Sidekick Lab';
}
applyProductHeader();

const CURRENT_VERSION = '3.16';

function onConsentChange() {
  updateEmailBtn();
}

function updateEmailBtn() {
  const checked = document.getElementById('consent-check').checked;
  const val = (document.getElementById('email-input').value || '').trim();
  const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
  document.getElementById('dl-btn').disabled = !(checked && valid);
}

async function submitEmail() {
  const email = document.getElementById('email-input').value.trim();
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showError('正しいメールアドレスを入力してください。');
    return;
  }
  const consentTimestamp = new Date().toISOString();
  document.getElementById('consent-state').style.display = 'none';
  document.getElementById('processing-state').style.display = 'block';

  try {
    const db = firebase.firestore();
    const now = firebase.firestore.FieldValue.serverTimestamp();

    let uid = 'email-' + Date.now();
    try {
      const anon = await firebase.auth().signInAnonymously();
      uid = anon.user.uid;
    } catch(e) { /* 匿名 Auth 未有効でも続行 */ }

    try {
      await db.collection('downloads').add({
        userId: uid,
        email: email,
        productName: PRODUCT_NAME,
        downloadedAt: now,
        version: CURRENT_VERSION,
        sourcePage: SRC,
        leadSource: SRC,
        consentVersion: CONSENT_VERSION,
        consentedAt: consentTimestamp,
        authMethod: 'email-only'
      });
    } catch(e) { console.warn('Firestore write skipped:', e.message); }

    fetch('/api/add-contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: email,
        firstName: '',
        product: PRODUCT_NAME,
        leadSource: SRC,
        interest: 'photography'
      })
    }).catch(function() {});

    localStorage.setItem('sk_dl_authorized', '1');
    window.location.href = DL_PAGE;

  } catch(err) {
    document.getElementById('processing-state').style.display = 'none';
    document.getElementById('consent-state').style.display = 'block';
    showError('処理中にエラーが発生しました。もう一度お試しください。\n(' + err.message + ')');
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
