<script>
const R2_URL = 'https://pub-123781c638d64762ac2e397ce0e98259.r2.dev/Sidekick_SkyEffect.zip';

firebase.auth().onAuthStateChanged(function(user) {
  const emailBypass = localStorage.getItem('sk_dl_authorized') === '1';

  const btn = document.getElementById('dl-btn');
  btn.href = R2_URL;

    const a = document.createElement('a');
    a.href = R2_URL;
    a.download = 'Sidekick_SkyEffect.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }, 1000);
