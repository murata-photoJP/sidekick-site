<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<!-- 言語自動判定：既存サイトの他ページと同じ挙動（打ち出の小槌base.htmlを踏襲）。
     開発日誌は今回は多言語化を行わないため、遷移先は常に /en/ のトップとする。 -->
<script>
  (function () {
    try {
      var pref = localStorage.getItem('sk_lang_pref');
      if (pref === 'ja') return;
      if (pref === 'en') { location.replace('/en/'); return; }
      var langs = navigator.languages || [navigator.language || navigator.userLanguage || ''];
      var isJapanese = langs.some(function (l) { return /^ja/i.test(l); });
      if (!isJapanese) {
        localStorage.setItem('sk_lang_pref', 'en');
        location.replace('/en/');
      }
    } catch (e) { /* localStorageが使えない環境などは何もしない */ }
  })();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}SideKick{% endblock %}</title>
<meta name="description" content="{% block meta_description %}{% endblock %}">
<link rel="canonical" href="{% block canonical %}{% endblock %}">
<meta property="og:type" content="{% block og_type %}website{% endblock %}">
<meta property="og:title" content="{% block og_title %}{{ self.title() }}{% endblock %}">
<meta property="og:description" content="{{ self.meta_description() }}">
<meta property="og:url" content="{{ self.canonical() }}">
<meta property="og:image" content="{{ og_image|default('https://www.sidekick-lab.com/images/awards/milkyway_03_after.jpg') }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ og_image|default('https://www.sidekick-lab.com/images/awards/milkyway_03_after.jpg') }}">
{% block extra_meta %}{% endblock %}
<!-- 開発日誌はKnowledgeと視覚的な統一感を保つため、既存の共通スタイルシートをそのまま利用する
     （新規CSSファイルは追加せず、既存のkzc-*クラスを流用する）。 -->
<link rel="stylesheet" href="/assets/css/knowledge.css">
</head>
<body>
{% include "header.html" %}
<main>
{% block content %}{% endblock %}
</main>
{% include "footer.html" %}
</body>
</html>
