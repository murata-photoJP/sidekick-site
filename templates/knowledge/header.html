<!-- 2026-07-17改訂: 打ち出の小槌専用の独自ヘッダーをやめ、既存サイト(index.html)の
     言語バナー・ヘッダー構成をそのまま流用する（村田さんの方針転換：サイト全体としての
     一貫性を優先する）。リンクはすべて打ち出の小槌ページ（/knowledge/配下、1〜2階層下）
     からでも正しく機能するよう、相対パスではなくルート相対パス（先頭に/）にしている。
     モバイル時に「単にdisplay:noneで隠すだけ」という既存サイトの実装は踏襲せず、
     キーボード操作・aria-expanded対応のトグルボタンを付与している
     （docs/COMPONENTS/01_GLOBAL_COMPONENTS.mdのモバイルナビ要件を維持）。 -->

<div class="lang-banner" id="lang-banner">
  🇺🇸 This site is also available in English —
  <a href="{{ lang_switch_url|default('/en/') }}">View English page →</a>
  <button class="lang-banner-close" onclick="document.getElementById('lang-banner').style.display='none'" aria-label="Close">✕</button>
</div>

<header class="hdr">
  <div class="wrap hdr-in">
    <a href="/" class="brand">
      <div class="brand-mk">S</div>
      <div>
        <div class="brand-name">Sidekick Lab</div>
        <span class="brand-sub">by Ichiro Murata</span>
      </div>
    </a>

    <button type="button" class="kzc-nav-toggle" aria-expanded="false" aria-controls="kzc-nav-menu">
      <span class="kzc-nav-toggle-label">メニュー</span>
    </button>

    <nav class="nav" id="kzc-nav-menu" aria-label="グローバルナビゲーション">
      <a href="/sidekick-star">⭐ Star</a>
      <a href="/portrait">👤 Portrait</a>
      <a href="/sky-effect">☁️ Sky</a>
      <a href="/knowledge" {% if nav_current == "knowledge" %}aria-current="page"{% endif %}>📚 打ち出の小槌</a>
      <a href="/workshop">📷 Workshop</a>
      <a href="/gallery" style="color:var(--muted);">Gallery</a>
      <a href="/sidekick" style="color:var(--muted);">Sidekickとは</a>
      <a href="/about" style="color:var(--muted);">About</a>
      <a href="/changelog" style="color:var(--muted);">更新履歴</a>
      <a href="/faq" style="color:var(--muted);">Support</a>
      <a href="/#ai-lab" class="nav-ai">🤖 AI Lab 無料</a>
      <a href="{{ lang_switch_url|default('/en/') }}" style="display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--muted);font-size:12px;font-weight:700;">🇺🇸 EN</a>
    </nav>
  </div>
</header>

<script>
(function () {
  var body = document.body;
  var toggle = document.querySelector(".kzc-nav-toggle");
  var menu = document.getElementById("kzc-nav-menu");
  if (!toggle || !menu) { return; }

  // JSが動いている場合のみ、折りたたみメニューを有効にする（progressive enhancement）。
  // JSが読み込まれない/失敗した場合は、CSSの既定値により全リンクが常時表示のまま残る。
  body.classList.add("kzc-js-nav");

  function closeMenu() {
    menu.setAttribute("data-open", "false");
    toggle.setAttribute("aria-expanded", "false");
  }
  function openMenu() {
    menu.setAttribute("data-open", "true");
    toggle.setAttribute("aria-expanded", "true");
  }

  closeMenu();

  toggle.addEventListener("click", function () {
    var isOpen = toggle.getAttribute("aria-expanded") === "true";
    if (isOpen) { closeMenu(); } else { openMenu(); }
  });

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && toggle.getAttribute("aria-expanded") === "true") {
      closeMenu();
      toggle.focus();
    }
  });

  document.addEventListener("click", function (e) {
    if (toggle.getAttribute("aria-expanded") !== "true") { return; }
    if (!menu.contains(e.target) && !toggle.contains(e.target)) {
      closeMenu();
    }
  });
})();
</script>
