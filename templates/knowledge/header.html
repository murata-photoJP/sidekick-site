<!-- Phase A2: 打ち出の小槌ページ専用の共通ヘッダー。既存サイトの他ページには適用していない。
     実在するURL（index.html調査に基づく）へリンクする。Productsは単独ページが無いため、
     トップページのProductsセクション（index.html #products）へ接続する。 -->
<header class="kzc-header">
  <div class="kzc-header-inner">
    <a href="/" class="kzc-brand">SideKick</a>

    <button type="button" class="kzc-nav-toggle" aria-expanded="false" aria-controls="kzc-nav-menu">
      <span class="kzc-nav-toggle-label">メニュー</span>
    </button>

    <nav class="kzc-nav" aria-label="グローバルナビゲーション">
      <ul id="kzc-nav-menu" class="kzc-nav-menu">
        <li><a href="/#products">Products</a></li>
        <li><a href="/knowledge" {% if nav_current == "knowledge" %}aria-current="page"{% endif %}>打ち出の小槌</a></li>
        <li><a href="/ai-lab">AI Lab</a></li>
        <li><a href="/workshop">Workshop</a></li>
        <li><a href="/about">About</a></li>
      </ul>
    </nav>

    <div class="kzc-lang-switch">
      <a href="/en/" lang="en" hreflang="en">EN</a>
    </div>
  </div>
</header>

<script>
(function () {
  var body = document.body;
  var toggle = document.querySelector(".kzc-nav-toggle");
  var menu = document.getElementById("kzc-nav-menu");
  if (!toggle || !menu) { return; }

  // JSが動いている場合のみ、折りたたみメニューを有効にする（progressive enhancement）。
  // JSが読み込まれない/失敗した場合は、CSSの既定値により全リンクが常時表示のまま残る。
  body.classList.add("kzc-js-nav");

  function closeMenu() {
    menu.setAttribute("data-open", "false");
    toggle.setAttribute("aria-expanded", "false");
  }
  function openMenu() {
    menu.setAttribute("data-open", "true");
    toggle.setAttribute("aria-expanded", "true");
  }

  closeMenu();

  toggle.addEventListener("click", function () {
    var isOpen = toggle.getAttribute("aria-expanded") === "true";
    if (isOpen) { closeMenu(); } else { openMenu(); }
  });

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && toggle.getAttribute("aria-expanded") === "true") {
      closeMenu();
      toggle.focus();
    }
  });

  document.addEventListener("click", function (e) {
    if (toggle.getAttribute("aria-expanded") !== "true") { return; }
    if (!menu.contains(e.target) && !toggle.contains(e.target)) {
      closeMenu();
    }
  });
})();
</script>
