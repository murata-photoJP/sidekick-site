     英語版ページのみを対象にする。/en/配下に実在しないページ（Workshop・Legal・Privacy等）

     JA版のheader.htmlは変更していない。 -->

</div>

<header class="hdr">
  <div class="wrap hdr-in">
    <a href="/en/" class="brand">

      <div>
        <div class="brand-name">Sidekick Lab</div>
        <span class="brand-sub">by Ichiro Murata</span>
      </div>
    </a>

    <button type="button" class="kzc-nav-toggle" aria-expanded="false" aria-controls="kzc-nav-menu-en">
      <span class="kzc-nav-toggle-label">Menu</span>
    </button>

    <nav class="nav" id="kzc-nav-menu-en" aria-label="Global navigation">
      <a href="/en/sidekick-star.html">⭐ Star</a>
      <a href="/en/portrait.html">👤 Portrait</a>
      <a href="/en/sky-effect.html">☁️ Sky</a>

      <a href="/en/about.html" style="color:var(--muted);">About</a>

      <a href="/en/ai-lab.html" class="nav-ai">🤖 AI Lab Free</a>

    </nav>
  </div>
</header>

<script>
(function () {
  var body = document.body;
  var toggle = document.querySelector(".kzc-nav-toggle");
  var menu = document.getElementById("kzc-nav-menu-en");
  if (!toggle || !menu) { return; }

  body.classList.add("kzc-js-nav");

  function closeMenu() {
    menu.setAttribute("data-open", "false");
    toggle.setAttribute("aria-expanded", "false");
  }
  function openMenu() {
    menu.setAttribute("data-open", "true");
    toggle.setAttribute("aria-expanded", "true");
  }

  closeMenu();

  toggle.addEventListener("click", function () {
    var isOpen = toggle.getAttribute("aria-expanded") === "true";
    if (isOpen) { closeMenu(); } else { openMenu(); }
  });

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && toggle.getAttribute("aria-expanded") === "true") {
      closeMenu();
      toggle.focus();
    }
  });

  document.addEventListener("click", function (e) {
    if (toggle.getAttribute("aria-expanded") !== "true") { return; }
    if (!menu.contains(e.target) && !toggle.contains(e.target)) {
      closeMenu();
    }
  });
})();
</script>
